name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    container: ${{ matrix.container }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu, fedora]
        qt_major: [5, 6]
        include:
          - os: fedora
            container: fedora:latest
    name: build-${{ matrix.os }}-qt${{ matrix.qt_major }}
    steps:
      - name: prepare container (Fedora)
        if: matrix.os == 'fedora'
        run: dnf install -y --setopt=install_weak_deps=False git tar findutils

      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: install build deps (Ubuntu Qt5)
        if: matrix.os == 'ubuntu' && matrix.qt_major == 5
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake pkg-config \
            qtbase5-dev qtbase5-dev-tools \
            libqt5websockets5-dev \
            libpcap-dev libprotobuf-dev protobuf-compiler zlib1g-dev

      - name: install build deps (Ubuntu Qt6)
        if: matrix.os == 'ubuntu' && matrix.qt_major == 6
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake pkg-config \
            qt6-base-dev qt6-websockets-dev qt6-5compat-dev \
            libpcap-dev libprotobuf-dev protobuf-compiler zlib1g-dev

      - name: install build deps (Fedora Qt5)
        if: matrix.os == 'fedora' && matrix.qt_major == 5
        run: |
          dnf install -y --setopt=install_weak_deps=False \
            gcc gcc-c++ make cmake pkgconf-pkg-config \
            qt5-qtbase-devel qt5-qtwebsockets-devel \
            libpcap-devel protobuf-devel protobuf-compiler zlib-devel

      - name: install build deps (Fedora Qt6)
        if: matrix.os == 'fedora' && matrix.qt_major == 6
        run: |
          dnf install -y --setopt=install_weak_deps=False \
            gcc gcc-c++ make cmake pkgconf-pkg-config \
            qt6-qtbase-devel qt6-qtwebsockets-devel \
            libpcap-devel protobuf-devel protobuf-compiler zlib-devel

      - name: configure (Qt5)
        if: matrix.qt_major == 5
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DSEQ_USE_QT5=ON

      - name: configure (Qt6)
        if: matrix.qt_major == 6
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: build
        run: cmake --build build -j

      - name: test
        working-directory: build
        run: ctest --output-on-failure

      - name: smoke
        run: |
          # ctest is unit tests; it doesn't actually launch the daemon.
          # Synthesize a minimal spells_us.txt + eqstr_us.txt + empty
          # .vpk and run a real --replay end-to-end. Catches startup
          # crashes that unit tests can't see — e.g. the trailing-NUL
          # bug in the text loaders that ate the Qt6 build's first
          # live run before f256926.
          printf '1^Test%s\n' "$(printf '^0%.0s' {1..60})" > conf/spells_us.txt
          printf '1\n0\n' > conf/eqstr_us.txt
          touch /tmp/empty.vpk
          ./build/showeq-daemon --replay /tmp/empty.vpk --no-listen --config-dir conf
